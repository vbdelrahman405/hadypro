<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HadyPro - Content Creator & Streamer</title>
    
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1920&q=80') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        /* تأثير الإضاءة الخلفية */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        /* صورة البروفايل */
        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 60px rgba(138, 43, 226, 0.2);
            margin-bottom: 25px;
            transition: all 0.4s ease;
            position: relative;
        }

        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* الاسم */
        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(to right, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        /* تأثير الكتابة Typewriter */
        .typing-container {
            height: 40px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .typing-text {
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #aaa;
            border-right: 3px solid #fff;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 4s steps(24) infinite alternate, blink 0.7s step-end infinite;
            width: 0;
        }

        @keyframes typing {
            0% { width: 0; }
            60% { width: 100%; }
            100% { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* روابط التواصل الاجتماعي */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .social-links a {
            position: relative;
            color: #fff;
            font-size: 28px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            backdrop-filter: blur(10px);
        }

        /* Tooltip (اسم التطبيق) */
        .social-links a::before {
            content: attr(data-platform);
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 1px;
        }

        .social-links a::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-bottom-color: rgba(0, 0, 0, 0.9);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .social-links a:hover::before,
        .social-links a:hover::after {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* ألوان Hover لكل منصة */
        .social-links a:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Kick - أخضر */
        a[data-platform="KICK"]:hover {
            background: #53fc18;
            color: #000;
            box-shadow: 0 0 20px rgba(83, 252, 24, 0.5);
        }

        /* Facebook - أزرق */
        a[data-platform="Facebook"]:hover {
            background: #1877f2;
            box-shadow: 0 0 20px rgba(24, 119, 242, 0.5);
        }

        /* Instagram - تدرج */
        a[data-platform="Instagram"]:hover {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            box-shadow: 0 0 20px rgba(220, 39, 67, 0.5);
        }

        /* TikTok - أسود/أحمر/سماوي */
        a[data-platform="TikTok"]:hover {
            background: #000;
            color: #fff;
            text-shadow: 2px 0 #ff0050, -2px 0 #00f2ea;
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.4);
        }

        /* WhatsApp - أخضر */
        a[data-platform="WhatsApp"]:hover {
            background: #25d366;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.5);
        }

        /* Discord - بنفسجي */
        a[data-platform="Discord"]:hover {
            background: #5865f2;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.5);
        }

        /* الفوتر */
        footer {
            position: absolute;
            bottom: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
        }

        footer p {
            margin: 5px 0;
        }

        footer .developer {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
        }

        /* Responsive للموبايل */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .profile-img { width: 130px; height: 130px; }
            .social-links { gap: 15px; }
            .social-links a { width: 50px; height: 50px; font-size: 22px; }
            .typing-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    </div>

    <footer>

</html>
